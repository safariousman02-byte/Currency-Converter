<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Currency Converter</title>
    </head>

    <body>

        <div class="box">
            
            <h2>Currency Converter</h2>

            <label for="amount">Amount</label>
            <input type="number" id="amount" value="1" min="0" step="0.01">

            <label for="fromCurrency">From</label>
            <select name="fromCurrency" id="fromCurrency">
                <option value="USD">US USD</option>
                <option value="EUR" selected>EU EUR</option>
                <option value="GBP">GB GBP</option>
                <option value="JPY">JP JPY</option>
                <option value="NGP">NG NGP</option>
            </select>

            <label for="toCurrency">To</label>
            <select name="toCurrency" id="toCurrency">
                <option value="USD" selected>US USD</option>
                <option value="EUR">EU EUR</option>
                <option value="GBP">GB GBP</option>
                <option value="JPY">JP JPY</option>
                <option value="NGP">NG NGP</option>
            </select>

            <button id="convertBtn">Convert</button>

            <div id="result"><p>Enter amount and click convert</p></div>

      
        </div>

        <script>

            const resultD = document.getElementById('result');
            const convertBtn = document.getElementById('convertBtn');
            const amountInput = document.getElementById('amount');
            const toCurrency = document.getElementById('toCurrency');
            const fromCurrency = document.getElementById('fromCurrency');

            async function convertCurrency() {

                resultD.innerHTML = '<p style="color: blue;">processing data!...</p>';

                const amount = perseFlout(amountInput.value);

                if (isNaN(amount) || amount <= 0) {
                    
                    resultD.innerHTML = '<p style="color: red;">Please enter a valid number!</p>';

                    return;
                }

                const from = fromCurrency.value;
                const to = toCurrency.value;

                if (from === to) {
                    
                    resultD.innerHTML = `<p style="color: #333;">${from} = ${to}</p>`;

                   return;
                }

               resultD.innerHTML = '<p style="color: #333;">Converting the currency!...</p>'; 

               try {

                    const url = `https://api.exchangerate-api.com/v4/latest/${from}`;
                    const response = await fetch(url);

                    if(!response.ok) {
                        throw new Error('API ERROR');
                    }

                    const data = await response.json();
                    const rate = data.rates[to];
                    const result = amount * rate;

                    resultD.innerHTML = `<p style="color: #28a745;">${from} = ${result.toFixed(2)} ${to}</p>`;

               }
               catch(error) {

                resultD.innerHTML = `<p style="color: #dc3545;">Error: ${error}</p>`;

               }

            }

            convertBtn.onclick = convertCurrency;




        </script>
        
    </body>

</html>
