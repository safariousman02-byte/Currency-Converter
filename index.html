<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Currency Converter</title>

        <style>

            body {
                font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
                background: #f0f2f5;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                padding: 20px;
            }

            .box {
                background: white;
                padding: 30px;
                border-radius: 10px;
                width: 400px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            }

            h1 {
                text-align: center;
                color: #333;
                margin-top: 0;
            }

            label {
                display: block;
                font-weight: bold;
                margin: 10px 0 5px;
                font-size: 14px;
            }

            input, select {
                width: 100%;
                border-radius: 5ps;
                border: 2px solid #ddd;
                padding: 15px;
                font-size: 15px;
                box-sizing: border-box;
            }

            input:focus , section:focus{
                border-color: #007bff;
                outline: none;
            }

            button {
                width: 100%;
                padding: 12px;
                color: white;
                border: none;
                background: #007bff;
                border-radius: 5px;
                font-size: 18px;
                cursor: pointer;
                margin: 15px 0;
            }

            button:hover {
                background: #0056b3;
                color: #333;
            }

        </style>

    </head>

    <body>

        <div class="box">
            
            <h1>Currency Converter</h1>

            <label for="amount">Amount</label>
            <input type="number" id="amount" value="1" min="0" step="0.01">

            <label for="fromCurrency">From</label>
            <select name="fromCurrency" id="fromCurrency">
                <option value="USD">US USD</option>
                <option value="EUR" selected>EU EUR</option>
                <option value="GBP">GB GBP</option>
                <option value="JPY">JP JPY</option>
                <option value="NGP">NG NGP</option>
            </select>

            <label for="toCurrency">To</label>
            <select name="toCurrency" id="toCurrency">
                <option value="USD" selected>US USD</option>
                <option value="EUR">EU EUR</option>
                <option value="GBP">GB GBP</option>
                <option value="JPY">JP JPY</option>
                <option value="NGP">NG NGP</option>
            </select>

            <button id="convertBtn">Convert</button>

            <div id="result"><p>Enter amount and click convert</p></div>

      
        </div>

        <script src="/script.js"></script>

    </body>

</html>
